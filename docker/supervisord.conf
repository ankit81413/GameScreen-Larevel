[supervisord]
nodaemon=true
user=root

[program:laravel]
command=/bin/sh -c "php artisan serve --host=0.0.0.0 --port=${PORT:-10000}"
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:queue]
command=php artisan queue:work redis --sleep=3 --tries=3 --timeout=300 --no-interaction -vvv
autostart=true
autorestart=true
startsecs=1
startretries=100
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
